<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Informasi Bahan Ajar - SITTA UT</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div id="app">
      <div class="stok-container">
        <a href="dashboard.html" class="back-btn">Back</a>

        <div class="stok-header">
          <h1>Informasi Bahan Ajar</h1>
          <p class="subtitle">
            Daftar informasi bahan ajar Universitas Terbuka
          </p>
        </div>

        <div class="informasi-list">
          <div
            class="bahan-card"
            v-for="item in dataBahanAjar"
            :key="item.kodeBarang"
          >
            <img :src="item.cover" :alt="item.namaBarang" />

            <div class="info-item">
              <h4>Kode Lokasi</h4>
              <p>{{ item.kodeLokasi }}</p>
            </div>

            <div class="info-item">
              <h4>Kode Barang</h4>
              <p>{{ item.kodeBarang }}</p>
            </div>

            <div class="info-item">
              <h4>Nama Barang</h4>
              <p>{{ item.namaBarang }}</p>
            </div>

            <div class="info-item">
              <h4>Jenis Barang</h4>
              <p>{{ item.jenisBarang }}</p>
            </div>

            <div class="info-item">
              <h4>Edisi</h4>
              <p>{{ item.edisi }}</p>
            </div>

            <div class="info-item">
              <h4>Stok</h4>
              <p>{{ item.stok }}</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="js/data.js"></script>
    <script src="js/informasi-app.js"></script>
  </body>
</html>
