<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SITTA UT - Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div id="app">
    <nav>
      <button @click="tab = 'stok'">Stok</button>
      <button @click="tab = 'tracking'">Tracking DO</button>
      <button @click="tab = 'order'">Pemesanan</button>
    </nav>

    <section v-show="tab === 'stok'">
      <ba-stock-table :items="state.stok"></ba-stock-table>
    </section>

    <section v-show="tab === 'tracking'">
      <do-tracking
        :data="state.tracking"
        :paket="state.paket"
        :ekspedisi="state.pengirimanList">
      </do-tracking>
    </section>

    <section v-show="tab === 'order'">
      <order-form
        :paket="state.paket"
        :ekspedisi="state.pengirimanList"
        @created="handleNewDO">
      </order-form>
    </section>

    <app-modal ref="modal"></app-modal>
  </div>

  <div id="template-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>

  <script>
    window.AppTemplates = {};
  
    function cleanTemplate(html) {
      html = html.replace(/<script[\s\S]*?<\/script>/gi, '');
  
      var parser = new DOMParser();
      var doc = parser.parseFromString(html, 'text/html');
      var template = doc.querySelector('template');
  
      if (template) {
        return template.innerHTML.trim();
      }
  
      return doc.body.innerHTML.trim();
    }
  
    Promise.all([
      fetch('templates/stock-table.html').then(r => r.text()),
      fetch('templates/do-tracking.html').then(r => r.text()),
      fetch('templates/order-form.html').then(r => r.text()),
      fetch('templates/status-badge.html').then(r => r.text()),
      fetch('templates/app-modal.html').then(r => r.text())
    ]).then(function(result) {
      window.AppTemplates.stock = cleanTemplate(result[0]);
      window.AppTemplates.tracking = cleanTemplate(result[1]);
      window.AppTemplates.order = cleanTemplate(result[2]);
      window.AppTemplates.badge = cleanTemplate(result[3]);
      window.AppTemplates.modal = cleanTemplate(result[4]);
  
      var scriptList = [
        'js/services/api.js',
        'js/components/status-badge.js',
        'js/components/stock-table.js',
        'js/components/do-tracking.js',
        'js/components/order-form.js',
        'js/components/app-modal.js',
        'js/app.js'
      ];
  
      function loadScript(index) {
        if (index >= scriptList.length) return;
  
        var script = document.createElement('script');
        script.src = scriptList[index];
        script.onload = function() {
          loadScript(index + 1);
        };
        document.body.appendChild(script);
      }
  
      loadScript(0);
    });
  </script>
</body>
</html>
