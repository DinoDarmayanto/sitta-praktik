<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SITTA UT - Dashboard</title>

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div id="app" v-cloak>
    <header class="dashboard-header">
      <h1>SITTA UT</h1>
      <p>Sistem Informasi Transaksi Bahan Ajar</p>
    </header>

    <nav class="dashboard-nav">
      <button
        :class="{ active: tab === 'stok' }"
        @click="tab = 'stok'"
      >
        Stok
      </button>

      <button
        :class="{ active: tab === 'tracking' }"
        @click="tab = 'tracking'"
      >
        Tracking DO
      </button>

      <button
        :class="{ active: tab === 'order' }"
        @click="tab = 'order'"
      >
        Pemesanan
      </button>
    </nav>

    <main class="dashboard-content">
      <section v-show="tab === 'stok'">
        <ba-stock-table
          :items="state.stok">
        </ba-stock-table>
      </section>

      <section v-show="tab === 'tracking'">
        <do-tracking
          :data="state.tracking"
          :paket="state.paket"
          :ekspedisi="state.pengirimanList">
        </do-tracking>
      </section>

      <section v-show="tab === 'order'">
        <order-form
          :paket="state.paket"
          :ekspedisi="state.pengirimanList"
          @created="handleNewDO">
        </order-form>
      </section>
    </main>

    <app-modal ref="modal"></app-modal>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>

  <script>
    window.AppTemplates = {};

    function cleanTemplate(html) {
      html = html.replace(/<script[\s\S]*?<\/script>/gi, '');

      var parser = new DOMParser();
      var doc = parser.parseFromString(html, 'text/html');
      var template = doc.querySelector('template');

      if (template) {
        return template.innerHTML.trim();
      }

      return doc.body.innerHTML.trim();
    }

    function fetchTemplate(path) {
      return fetch(path).then(function(response) {
        if (!response.ok) {
          throw new Error('Template tidak ditemukan: ' + path);
        }

        return response.text();
      });
    }

    function loadScript(path) {
      return new Promise(function(resolve, reject) {
        var script = document.createElement('script');
        script.src = path;

        script.onload = resolve;

        script.onerror = function() {
          reject(new Error('Script gagal dimuat: ' + path));
        };

        document.body.appendChild(script);
      });
    }

    Promise.all([
      fetchTemplate('templates/stock-table.html'),
      fetchTemplate('templates/do-tracking.html'),
      fetchTemplate('templates/order-form.html'),
      fetchTemplate('templates/status-badge.html'),
      fetchTemplate('templates/app-modal.html')
    ])
      .then(function(result) {
        window.AppTemplates.stock = cleanTemplate(result[0]);
        window.AppTemplates.tracking = cleanTemplate(result[1]);
        window.AppTemplates.order = cleanTemplate(result[2]);
        window.AppTemplates.badge = cleanTemplate(result[3]);
        window.AppTemplates.modal = cleanTemplate(result[4]);

        return loadScript('js/services/api.js');
      })
      .then(function() {
        return loadScript('js/components/status-badge.js');
      })
      .then(function() {
        return loadScript('js/components/stock-table.js');
      })
      .then(function() {
        return loadScript('js/components/do-tracking.js');
      })
      .then(function() {
        return loadScript('js/components/order-form.js');
      })
      .then(function() {
        return loadScript('js/components/app-modal.js');
      })
      .then(function() {
        return loadScript('js/app.js');
      })
      .catch(function(error) {
        console.error(error);

        document.body.insertAdjacentHTML(
          'beforeend',
          '<div style="padding:16px;color:red;">Gagal memuat aplikasi. Cek console untuk detail error.</div>'
        );
      });
  </script>
</body>
</html>
